---
- name: Set vault token for future use
  ansible.builtin.set_fact:
    ansible_test_vault_token: "{{ lookup('password', 'dev/null length=12 chars=ascii_letters,digits') }}"
    ansible_test_vault_url: "http://127.0.0.1:8200"
    ansible_test_vault_server_container_name: "{{ vault_server_name }}"

- name: Force remove old container
  ansible.builtin.shell: >-
    docker rm -f {{ ansible_test_vault_server_container_name }} || true
  changed_when: false

- name: Run new container
  ansible.builtin.shell: >-
    docker run -d --name {{ ansible_test_vault_server_container_name }} \
    -p 8200:8200 -e 'VAULT_DEV_ROOT_TOKEN_ID={{ ansible_test_vault_token }}' hashicorp/vault

- name: Vault enable databse engine
  vault_http_request:
    url: "{{ ansible_test_vault_url }}/v1/sys/mounts/database"
    method: POST
    token: "{{ ansible_test_vault_token }}"
    payload:
      type: "database"
      description: "Database secrets engine"
  register: result
  retries: 10
  delay: 3
  until: result is successful