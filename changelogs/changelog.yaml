ancestor: null
releases:
  1.0.0:
    changes:
      release_summary: This marks the first release of the hashicorp.vault collection.
    fragments:
      - v1.0.0.yml
    modules:
      - description: Manage HashiCorp Vault KV version 2 secrets
        name: kv2_secret
        namespace: ""
      - description: Read HashiCorp Vault KV version 2 secrets
        name: kv2_secret_info
        namespace: ""
    plugins:
      lookup:
        - description: Look up KV2 secrets stored in HashiCorp Vault.
          name: kv2_secret_get
          namespace: null
    release_date: "2025-09-19"
  1.1.0:
    changes:
      minor_changes:
        - Add an action group for the collection modules ``kv1_secret``, ``kv1_secret_info``,
          ``kv2_secret``, ``kv2_secret_info`` (https://github.com/ansible-collections/hashicorp.vault/pull/23).
        - kv2_secret_info - module will not fail when the requested secret does not
          exist instead returns an empty response (https://github.com/ansible-collections/hashicorp.vault/pull/23).
      release_summary:
        This release includes new modules and lookup plugin for KV1
        secret management.
    fragments:
      - 1.1.0.yml
      - 20251007-add-action-group.yaml
    modules:
      - description: Manage HashiCorp Vault KV version 1 secrets
        name: kv1_secret
        namespace: ""
      - description: Read HashiCorp Vault KV version 1 secrets
        name: kv1_secret_info
        namespace: ""
    plugins:
      lookup:
        - description: Look up KV1 secrets stored in HashiCorp Vault.
          name: kv1_secret_get
          namespace: null
    release_date: "2025-11-13"
  1.1.1:
    changes:
      bugfixes:
        - Fix parameter names used by authentication methods so parameters must be passed
          by correct names. See https://github.com/ansible-collections/hashicorp.vault/pull/35
          for more details.
      release_summary: This release fixes a bug in the ``kv2_secret_get`` lookup plugin's
        authentication parameters names so parameters must be passed by correct names.
    fragments:
      - 20260311-fix-auth-param-names.yaml
      - v1.1.1.yml
    release_date: "2026-03-13"
