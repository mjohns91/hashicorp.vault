---
minor_changes:
  - module_utils/vault_database.py - Add ``VaultDatabaseDynamicRoles`` class
    for managing database dynamic roles with ``list_dynamic_roles()``,
    ``read_dynamic_role()``, ``create_or_update_dynamic_role()``, and
    ``delete_dynamic_role()``
    (https://github.com/ansible-collections/hashicorp.vault/pull/91).
  - module_utils/vault_database.py - Update ``Database`` container class to
    include ``dynamic_roles`` client for managing dynamic database roles
    (https://github.com/ansible-collections/hashicorp.vault/pull/91).
  - module_utils/vault_database.py - Refactor database secrets engine classes
    into dedicated module. Move ``VaultDatabaseConnection``, ``VaultDatabaseStaticRoles``,
    ``VaultDatabaseDynamicRoles``, and ``Database`` classes from vault_client.py to new
    vault_database.py module for better code organization
    (https://github.com/ansible-collections/hashicorp.vault/pull/91).
  - module_utils/vault_database.py - Add ``VaultDatabaseParent`` base class to
    eliminate code duplication across database client classes
    (https://github.com/ansible-collections/hashicorp.vault/pull/91).
